name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Detect native addons
        shell: bash
        run: |
          if pnpm ls --depth Infinity 2>/dev/null | grep -iE "node-gyp|prebuild-install|node-pre-gyp|cmake-js"; then
            echo "::error::Native addon dependency detected! This project must have zero native dependencies (INFRA-02)."
            exit 1
          fi
          echo "No native addon dependencies found."
